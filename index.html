<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Rakesh Verma | Senior Solution Architect & AWS Cloud Engineer</title>
  <meta name="description" content="Rakesh Verma — 18+ years in enterprise IT, AWS Certified Solutions Architect, cloud infrastructure, mainframe modernization, and technical leadership in Healthcare and Finance." />
  <meta name="keywords" content="Rakesh Verma, Senior Solution Architect, AWS, Cloud Engineer, Terraform, CI/CD, Mainframe, COBOL, Healthcare IT, Cigna" />
  <meta name="author" content="Rakesh Verma" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type"        content="profile" />
  <meta property="og:title"       content="Rakesh Verma | Senior Solution Architect & AWS Cloud Engineer" />
  <meta property="og:description" content="18+ years in enterprise IT — cloud architecture, DevOps, mainframe modernization, and technical leadership. AWS Certified Solutions Architect. MBA in Business Analytics." />
  <meta property="og:locale"      content="en_US" />
  <meta property="profile:first_name" content="Rakesh" />
  <meta property="profile:last_name"  content="Verma" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Rakesh Verma | Senior Solution Architect" />
  <meta name="twitter:description" content="18+ years in enterprise IT, AWS cloud architecture, mainframe modernization." />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Rakesh Verma",
    "jobTitle": "Senior Solution Architect / Senior Staff Engineer",
    "description": "Technology leader with 18+ years in enterprise software engineering, AWS cloud architecture, mainframe modernization, and technical leadership in Healthcare and Finance.",
    "email": "mailto:Rakesh.verma2610@gmail.com",
    "telephone": "+1-862-242-6831",
    "alumniOf": [
      { "@type": "CollegeOrUniversity", "name": "University of Hartford" },
      { "@type": "CollegeOrUniversity", "name": "GGSIP University" }
    ],
    "knowsAbout": ["AWS", "Cloud Architecture", "Terraform", "CI/CD", "COBOL", "Mainframe", "Python", "DevOps", "Healthcare IT"],
    "worksFor": { "@type": "Organization", "name": "Cigna" }
  }
  </script>

  <link rel="stylesheet" href="style.css" />
  <noscript>
    <style>
      .reveal { opacity: 1 !important; transform: none !important; }
    </style>
  </noscript>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar"></nav>

  <!-- HERO -->
  <section class="hero" id="about">
    <div class="hero-inner">
      <div class="hero-text">
        <div class="hero-badge" id="hero-badge"></div>
        <h1><span id="hero-first"></span><span class="last-name" id="hero-last"></span></h1>
        <p class="hero-title" id="hero-title"></p>
        <p class="hero-summary" id="hero-summary"></p>
        <div class="hero-ctas" id="hero-ctas"></div>
      </div>
      <div class="hero-photo-wrap">
        <!--
          ╔═══════════════════════════════════════════════════════════╗
          ║  TO UPDATE YOUR PHOTO:                                    ║
          ║  Replace "assets/photo.svg" with your own image.          ║
          ║  Supported: .jpg, .png, .webp, .svg                      ║
          ║  Best: square 400×400 px.                                 ║
          ║  Then update "photo" in data.js to match your file name.  ║
          ╚═══════════════════════════════════════════════════════════╝
        -->
        <img id="hero-photo" src="assets/photo.svg" alt="Rakesh Verma" />
      </div>
    </div>
  </section>

  <!-- HIGHLIGHTS -->
  <section id="highlights" class="highlights-section">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Key Achievements</p>
      <h2 class="section-title reveal reveal-up">Impact at a Glance</h2>
      <div class="highlights-grid" id="highlights-grid"></div>
    </div>
  </section>

  <!-- EXPERIENCE -->
  <section id="experience">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Career</p>
      <h2 class="section-title reveal reveal-up">Professional Experience</h2>
      <div class="timeline" id="exp-list"></div>
    </div>
  </section>

  <!-- SKILLS -->
  <section id="skills">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Expertise</p>
      <h2 class="section-title reveal reveal-up">Technical Skills</h2>
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </section>

  <!-- EDUCATION -->
  <section id="education">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Academic</p>
      <h2 class="section-title reveal reveal-up">Education</h2>
      <div class="edu-cards" id="edu-list"></div>
    </div>
  </section>

  <!-- CERTIFICATIONS -->
  <section id="certifications">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Credentials</p>
      <h2 class="section-title reveal reveal-up">Certifications</h2>
      <div class="cert-list" id="cert-list"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="section-inner">
      <p class="section-label reveal reveal-up">Get In Touch</p>
      <h2 class="section-title reveal reveal-up">Contact</h2>
      <div class="contact-grid" id="contact-grid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p id="footer-text"></p>
  </footer>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
